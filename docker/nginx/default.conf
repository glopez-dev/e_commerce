# Not http context block as this file will be included into the nginx.conf file
server {

    listen 80;

    # Make the app accessible from http://localhost/
    server_name _;

    # The PHP-FPM Server (Symfony API)
    location /api {

        alias /var/www/api/public; 

        try_files $uri $uri/ @symfonyapi;

        # Toute URI se finissant par *.php
        location ~ \.php$ {
            include fastcgi_params;

            # Envoyer la requête au serveur applicatif
            # php_fpm est le nom du service docker compose.
            fastcgi_pass php_fpm:9000;

            fastcgi_param SCRIPT_FILENAME $request_filename;
        }
    }

    location @symfonyapi {
        rewrite /api/(.*)?$ /api/index.php?$is_args$args last;
    }

    location / {
        # the file the react app is mounted on   
        root /var/www/e_commerce/; 
        try_files $uri /index.html;
    }

    error_log /var/log/nginx/api_error.log;
    access_log /var/log/nginx/api_access.log;
}
