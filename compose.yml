version: 3.8

networks:
  webserver-tier:
  database-tier:

services: 
  # GOOD
  database:
    image: postgres:14-alpine
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - ./docker/postgres:/var/lib/postgresql/data
    networks:
      - database-tier
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    restart: always

  # IN PROGRESS
  php_fpm:
    build:
      # The Dockerfile should be located at the root of the project
      context: .
    depends_on:
      - database
    volumes:
      - ./src:/var/www/e_commerce/:cached
    networks:
      - database-tier

  nginx:
    image: nginx:1.25.1
    depends_on:
      - php_fpm
    ports:
      - 10302:80
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - webserver-tier 

  
volumes:
