---
name: e_commerce

networks:
  ecommerce:

volumes:
  frontend_build:

services:

  database:
    image: postgres:14-alpine
    restart: unless-stopped
    ports:
      - 5432:5432
    networks:
      - ecommerce
    env_file:
      - path: ./backend/.env.prod
        required: true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U symfony"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  php_fpm:
    build:
      context: .
    env_file:
      - ./backend/.env.prod
    ports:
      - 9000:9000
    networks:
      - ecommerce
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    volumes:
      - frontend_build:/var/www/e_commerce

  nginx:
    image: nginx:1.25.1
    depends_on:
      php_fpm:
        condition: service_started
      frontend:
        condition: service_completed_successfully
    ports:
      - 1030:80
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - frontend_build:/var/www/e_commerce:ro
    networks:
      - ecommerce
