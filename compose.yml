---
name: e_commerce

networks:
  ecommerce:

services: 

  database:
    image: postgres:14-alpine
    restart: unless-stopped
    ports:
      - 5432:5432
    networks:
      - ecommerce 
    env_file:
      - path: ./app/.env.prod
        required: true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U symfony"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  php_fpm:
    build:
      # The Dockerfile should be located at the root of the project
      context: .
    env_file:
      - ./app/.env.prod
    volumes:
      - ./app/:/var/www/api/
    ports:
      - 9000:9000
    networks:
      - ecommerce 
    depends_on:
      - database
    healthcheck:
      test: ["CMD-SHELL", "php", "bin/console", "doctrine:migration:migrate"]
      interval: 5s
      timeout: 30s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.25.1
    depends_on:
      - php_fpm
    ports:
      - 10302:80
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      # Mount the frontend application
      - ./front/build/:/var/www/e_commerce/
    networks:
      - ecommerce 

  
